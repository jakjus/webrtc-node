name: Setup native build
description: Install native build dependencies for the WebRTC Node addon.

inputs:
  windows-openssl-version:
    description: OpenSSL package version to install with Chocolatey on Windows.
    default: 3.6.2

runs:
  using: composite
  steps:
    - name: Install Linux build dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        set -euo pipefail
        for attempt in 1 2 3; do
          if sudo apt-get update && sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            libssl-dev \
            ninja-build \
            python3; then
            exit 0
          fi
          sleep $((attempt * 10))
        done
        exit 1

    - name: Install macOS OpenSSL
      if: runner.os == 'macOS'
      shell: bash
      run: |
        set -euo pipefail
        brew install openssl@3
        echo "OPENSSL_ROOT_DIR=$(brew --prefix openssl@3)" >> "$GITHUB_ENV"

    - name: Install Windows OpenSSL
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $opensslVersion = "${{ inputs.windows-openssl-version }}"
        choco install openssl --version $opensslVersion --no-progress -y
        if ($LASTEXITCODE -ne 0) {
          throw "Chocolatey failed to install OpenSSL $opensslVersion"
        }
        $roots = @(
          "C:\Program Files\OpenSSL",
          "C:\Program Files\OpenSSL-Win64",
          "C:\Program Files\OpenSSL-Win32"
        )
        $opensslRoot = $roots | Where-Object {
          Test-Path (Join-Path $_ "include\openssl\ssl.h")
        } | Select-Object -First 1
        if (-not $opensslRoot) {
          Get-ChildItem "C:\Program Files" -Directory -Filter "OpenSSL*" | Select-Object FullName
          throw "OpenSSL root was not found"
        }
        "OPENSSL_ROOT_DIR=$opensslRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
        "OPENSSL_INCLUDE_DIR=$opensslRoot\include" | Out-File -FilePath $env:GITHUB_ENV -Append
        "OPENSSL_BIN_DIR=$opensslRoot\bin" | Out-File -FilePath $env:GITHUB_ENV -Append
        $binDir = Join-Path $opensslRoot "bin"
        if (Test-Path $binDir) {
          $binDir | Out-File -FilePath $env:GITHUB_PATH -Append
          & (Join-Path $binDir "openssl.exe") version
        }
